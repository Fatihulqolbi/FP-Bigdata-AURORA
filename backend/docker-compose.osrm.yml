# OSRM routing engine for Surabaya road-following routes
# Run with: docker compose -f docker-compose.yml -f docker-compose.osrm.yml up -d osrm
# Prep map first: bash scripts/prepare-osrm.sh

services:
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:latest
    container_name: osrm-surabaya
    networks:
      - bigdata-net
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data/java:/data
    command: osrm-routed --algorithm mld /data/java-latest.osrm
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/route/v1/driving/112.620,-7.234;112.768,-7.250"]
      interval: 30s
      timeout: 5s
      retries: 3
